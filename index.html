<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <!-- box-sizing: border-pack 確保內邊距不撐開寬度，viewport-fit=cover 允許填滿瀏海屏 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>離線音樂播放器</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="音樂盒">
    <link rel="apple-touch-icon" href="icon.png">

    <link rel="manifest" href="manifest.json">

    <style>
        /* 現代 iOS 暗黑模式風格 */
        :root {
            /* 自動獲取 iOS 安全區域（避免遮擋瀏海屏與底部手勢條） */
            --safe-top: env(safe-area-inset-top, 44px);
            --safe-bottom: env(safe-area-inset-bottom, 34px);
        }
        
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* 移除 iOS 點擊時的藍色高亮 */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #000000; /* 使用純黑底色，完美隱藏瀏海屏 */
            color: #ffffff;
            display: flex;
            flex-direction: column;
            /* 100vh 在 iOS 上會有工具列高度計算錯誤的問題，這裡用標準高度填滿 */
            height: 100vh; 
            overflow: hidden; /* 防止整個網頁產生全域上下震動的橡皮筋效果 */
        }

        /* 頂部導航欄（避開瀏海屏） */
        header {
            padding-top: var(--safe-top);
            padding-left: 20px;
            padding-right: 20px;
            padding-bottom: 10px;
            background-color: #121212;
            border-bottom: 1px solid #262626;
        }
        header h1 {
            font-size: 20px;
            font-weight: 700;
            margin: 0;
            text-align: center;
            letter-spacing: 0.5px;
        }

        /* 播放器主控制面板（固定在上方） */
        #player-container {
            background: linear-gradient(180deg, #121212 0%, #1c1c1e 100%);
            padding: 20px;
            border-bottom: 1px solid #262626;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        #controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }
        
        #now-playing {
            font-size: 15px;
            font-weight: 500;
            color: #ff2d55; /* iOS Apple Music 經典桃紅色 */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 65%;
        }
        
        /* 播放模式按鈕 */
        .mode-btn {
            background: #2c2c2e;
            color: #ffffff;
            border: none;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .mode-btn.active {
            background: #ff2d55;
        }

        /* iOS 原生 HTML5 播放器介面優化 */
        audio {
            width: 100%;
            height: 40px;
            border-radius: 8px;
        }

        /* 歌單滾動區域（智慧型填充剩餘螢幕空間） */
        #playlist-container {
            flex-grow: 1;
            overflow-y: auto; /* 只有歌單區域可以上下捲動 */
            -webkit-overflow-scrolling: touch; /* 啟用 iOS 絲滑滾動效果 */
            padding: 15px 20px calc(var(--safe-bottom) + 15px) 20px; /* 底部留空避開 iOS 黑條 */
        }

        #playlist {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        /* 歌單單一曲目項目 */
        li {
            padding: 16px;
            background: #1c1c1e;
            margin-bottom: 10px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s ease;
        }
        li:active {
            background: #2c2c2e; /* 點擊時的灰化反饋 */
        }
        
        /* 當前播放中的歌曲高亮 */
        li.active {
            background: rgba(255, 45, 85, 0.15);
            border: 1px solid rgba(255, 45, 85, 0.4);
        }
        li.active span {
            color: #ff2d55;
            font-weight: 600;
        }
        
        li span {
            font-size: 15px;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 75%;
        }
        
        /* 下載狀態標籤 */
        .status-badge {
            font-size: 11px;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 6px;
            background: #2c2c2e;
            color: #8e8e93;
        }
        .downloaded {
            background: rgba(52, 199, 89, 0.15); /* iOS 綠色透明底 */
            color: #34c759 !important; /* iOS 綠色字 */
        }
    </style>
</head>
<body>

    <!-- 頂部標題（已安全避開動態島） -->
    <header>
        <h1>我的離線音樂盒</h1>
    </header>

    <!-- 核心播放控制器（固定在上方，不隨歌單滾動） -->
    <div id="player-container">
        <div id="controls-row">
            <div id="now-playing">準備就緒</div>
            <button id="mode-toggle" class="mode-btn" onclick="togglePlayMode()">🔁 順序播放</button>
        </div>
        <audio id="player" controls preload="auto"></audio>
    </div>

    <!-- 可獨立滾動的歌單區域 -->
    <div id="playlist-container">
        <ul id="playlist"></ul>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('Service Worker 註冊成功'))
                .catch(err => console.log('Service Worker 註冊失敗:', err));
        }

        let songs = []; 
        let currentTrackIndex = 0;
        let playMode = 'sequence'; 
        
        const player = document.getElementById('player');
        const playlistElem = document.getElementById('playlist');
        const nowPlayingElem = document.getElementById('now-playing');
        const modeToggleBtn = document.getElementById('mode-toggle');

        fetch('playlist.json')
            .then(res => res.json())
            .then(data => {
                songs = data;
                initPlaylist();
            })
            .catch(err => {
                nowPlayingElem.textContent = "無法載入歌單";
                console.error(err);
            });

        async function initPlaylist() {
            playlistElem.innerHTML = '';
            const cache = await caches.open('music-player-v2');

            for (let index = 0; index < songs.length; index++) {
                const song = songs[index];
                const li = document.createElement('li');
                li.dataset.index = index;
                
                const textSpan = document.createElement('span');
                textSpan.textContent = `${song.title} - ${song.artist}`;
                li.appendChild(textSpan);

                const statusSpan = document.createElement('span');
                statusSpan.classList.add('status-badge');
                
                const absoluteUrl = new URL(song.file, window.location.href).href;
                const cachedResponse = await cache.match(absoluteUrl);
                if (cachedResponse) {
                    statusSpan.textContent = '已下載';
                    statusSpan.classList.add('downloaded');
                } else {
                    statusSpan.textContent = '未下載';
                }
                li.appendChild(statusSpan);

                li.onclick = () => playTrack(index);
                playlistElem.appendChild(li);
            }
        }

        function togglePlayMode() {
            if (playMode === 'sequence') {
                playMode = 'random';
                modeToggleBtn.textContent = '🔀 隨機播放';
                modeToggleBtn.classList.add('active');
            } else {
                playMode = 'sequence';
                modeToggleBtn.textContent = '🔁 順序播放';
                modeToggleBtn.classList.remove('active');
            }
        }

        function playTrack(index) {
            if (index < 0 || index >= songs.length) return;
            currentTrackIndex = index;
            const song = songs[currentTrackIndex];

            player.src = song.file;
            player.play().catch(err => console.log("等待點擊播放:", err));

            nowPlayingElem.textContent = `${song.title}`;
            
            document.querySelectorAll('#playlist li').forEach((li, idx) => {
                if (idx === index) li.classList.add('add', 'active');
                else li.classList.remove('active');
            });

            updateMediaSession(song);
        }

        player.addEventListener('playing', () => {
            setTimeout(() => { initPlaylist(); }, 2000);
        });

        function updateMediaSession(song) {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: song.title,
                    artist: song.artist,
                    album: '本地離線播放清單',
                    artwork: [{ src: 'icon.png', sizes: '512x512', type: 'image/png' }]
                });

                navigator.mediaSession.setActionHandler('play', () => player.play());
                navigator.mediaSession.setActionHandler('pause', () => player.pause());
                navigator.mediaSession.setActionHandler('previoustrack', () => handleNextOrPrev('prev'));
                navigator.mediaSession.setActionHandler('nexttrack', () => handleNextOrPrev('next'));
            }
        }

        function handleNextOrPrev(direction) {
            if (playMode === 'random') {
                const randomIndex = Math.floor(Math.random() * songs.length);
                playTrack(randomIndex);
            } else {
                if (direction === 'next') {
                    if (currentTrackIndex + 1 < songs.length) {
                        playTrack(currentTrackIndex + 1);
                    } else {
                        playTrack(0);
                    }
                } else {
                    if (currentTrackIndex - 1 >= 0) {
                        playTrack(currentTrackIndex - 1);
                    } else {
                        playTrack(songs.length - 1);
                    }
                }
            }
        }

        player.addEventListener('ended', () => {
            handleNextOrPrev('next');
        });
    </script>
</body>
</html>
