<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>離線音樂播放器</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="音樂盒">
    <link rel="apple-touch-icon" href="icon.png">

    <link rel="manifest" href="manifest.json">

    <style>
        :root {
            --safe-top: env(safe-area-inset-top, 44px);
            --safe-bottom: env(safe-area-inset-bottom, 34px);
        }
        
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh; 
            overflow: hidden;
        }

        header {
            padding-top: var(--safe-top);
            padding-left: 20px;
            padding-right: 20px;
            padding-bottom: 10px;
            background-color: #121212;
            border-bottom: 1px solid #262626;
        }
        header h1 {
            font-size: 20px;
            font-weight: 700;
            margin: 0;
            text-align: center;
            letter-spacing: 0.5px;
        }

        #player-container {
            background: linear-gradient(180deg, #121212 0%, #1c1c1e 100%);
            padding: 20px;
            border-bottom: 1px solid #262626;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        #controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }
        
        #now-playing {
            font-size: 15px;
            font-weight: 500;
            color: #ff2d55;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 65%;
        }
        
        .mode-btn {
            background: #2c2c2e;
            color: #ffffff;
            border: none;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .mode-btn.active {
            background: #ff2d55;
        }

        audio {
            width: 100%;
            height: 40px;
            border-radius: 8px;
        }

        #playlist-container {
            flex-grow: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 15px 20px calc(var(--safe-bottom) + 15px) 20px;
        }

        #playlist {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        li {
            padding: 16px;
            background: #1c1c1e;
            margin-bottom: 10px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s ease;
            border: 1px solid transparent;
        }
        li:active {
            background: #2c2c2e;
        }
        
        /* 正在播放的歌曲保持紅色高亮 */
        li.active {
            background: rgba(255, 45, 85, 0.15) !important;
            border: 1px solid rgba(255, 45, 85, 0.4) !important;
        }
        li.active span.song-text {
            color: #ff2d55 !important;
            font-weight: 600;
        }
        
        li span.song-text {
            font-size: 15px;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 75%;
        }
        
        .status-badge {
            font-size: 11px;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 6px;
            background: #2c2c2e;
            color: #8e8e93;
        }
        .downloaded {
            background: rgba(52, 199, 89, 0.15);
            color: #34c759 !important;
        }

        #download-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .download-all-btn {
            background: #0a84ff;
            color: #ffffff;
            border: none;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        .download-all-btn:disabled {
            background: #3a3a3c;
            color: #8e8e93;
            cursor: default;
        }
        #download-status {
            font-size: 13px;
            color: #8e8e93;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <header>
        <h1>我的離線音樂盒</h1>
    </header>

    <div id="player-container">
        <div id="controls-row">
            <div id="now-playing">準備就緒</div>
            <button id="mode-toggle" class="mode-btn" onclick="togglePlayMode()">🔁 順序播放</button>
        </div>
        <audio id="player" controls preload="auto"></audio>
        <div id="download-row">
            <button id="download-btn" class="download-all-btn" onclick="downloadAllSongs()">⬇️ 下載全部離線</button>
            <span id="download-status">首次需在有網路時下載</span>
        </div>
    </div>

    <div id="playlist-container">
        <ul id="playlist"></ul>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('Service Worker 註冊成功'))
                .catch(err => console.log('Service Worker 註冊失敗:', err));
        }

        let songs = []; 
        let currentTrackIndex = -1; // 預設改為 -1，代表一開始沒人在放
        let playMode = 'sequence'; 
        
        const player = document.getElementById('player');
        const playlistElem = document.getElementById('playlist');
        const nowPlayingElem = document.getElementById('now-playing');
        const modeToggleBtn = document.getElementById('mode-toggle');

        fetch('playlist.json')
            .then(res => res.json())
            .then(data => {
                songs = data;
                initPlaylist();
            })
            .catch(err => {
                nowPlayingElem.textContent = "無法載入歌單";
                console.error(err);
            });

        // 🧠【終極修正】：全域直接比對，並且在重新渲染時鎖定當前播放曲目的紅色高亮
        async function initPlaylist() {
            playlistElem.innerHTML = '';
            
            for (let index = 0; index < songs.length; index++) {
                const song = songs[index];
                const li = document.createElement('li');
                li.dataset.index = index;
                
                // 💡【重要修正】：如果是當前正在放的歌，重新渲染時立刻補上 active 標籤，防止紅色 flash 消失！
                if (index === currentTrackIndex) {
                    li.classList.add('active');
                }
                
                const textSpan = document.createElement('span');
                textSpan.classList.add('song-text');
                textSpan.textContent = `${song.title} - ${song.artist}`;
                li.appendChild(textSpan);

                const statusSpan = document.createElement('span');
                statusSpan.classList.add('status-badge');
                
                const absoluteUrl = new URL(song.file, window.location.href).href;
                let isCached = false;

                // 💡【最安全比對】：直接免去名稱迴圈，使用全域環境判斷該網址是否被任意快取庫捕獲
                try {
                    if (window.caches) {
                        const cachedResponse = await caches.match(absoluteUrl);
                        if (cachedResponse) {
                            isCached = true;
                        }
                    }
                } catch (e) {
                    console.log(e);
                }

                if (isCached) {
                    statusSpan.textContent = '已下載';
                    statusSpan.classList.add('downloaded');
                } else {
                    statusSpan.textContent = '未下載';
                }
                li.appendChild(statusSpan);

                li.onclick = () => playTrack(index);
                playlistElem.appendChild(li);
            }
        }

        function togglePlayMode() {
            if (playMode === 'sequence') {
                playMode = 'random';
                modeToggleBtn.textContent = '🔀 隨機播放';
                modeToggleBtn.classList.add('active');
            } else {
                playMode = 'sequence';
                modeToggleBtn.textContent = '🔁 順序播放';
                modeToggleBtn.classList.remove('active');
            }
        }

        function playTrack(index) {
            if (index < 0 || index >= songs.length) return;
            currentTrackIndex = index; // 記住當前播放的索引
            const song = songs[currentTrackIndex];

            player.src = song.file;
            player.play().catch(err => console.log("等待點擊播放:", err));

            nowPlayingElem.textContent = `${song.title}`;
            
            // 立即更新一次高亮
            document.querySelectorAll('#playlist li').forEach((li, idx) => {
                if (idx === index) li.classList.add('active');
                else li.classList.remove('active');
            });

            updateMediaSession(song);
        }

        // 當音樂開始播放時，等待 2 秒刷新標籤狀態
        player.addEventListener('playing', () => {
            setTimeout(() => { initPlaylist(); }, 2000);
        });

        function updateMediaSession(song) {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: song.title,
                    artist: song.artist,
                    album: '本地離線播放清單',
                    artwork: [{ src: 'icon.png', sizes: '512x512', type: 'image/png' }]
                });

                navigator.mediaSession.setActionHandler('play', () => player.play());
                navigator.mediaSession.setActionHandler('pause', () => player.pause());
                navigator.mediaSession.setActionHandler('previoustrack', () => handleNextOrPrev('prev'));
                navigator.mediaSession.setActionHandler('nexttrack', () => handleNextOrPrev('next'));
            }
        }

        function handleNextOrPrev(direction) {
            if (playMode === 'random') {
                const randomIndex = Math.floor(Math.random() * songs.length);
                playTrack(randomIndex);
            } else {
                if (direction === 'next') {
                    if (currentTrackIndex + 1 < songs.length) {
                        playTrack(currentTrackIndex + 1);
                    } else {
                        playTrack(0);
                    }
                } else {
                    if (currentTrackIndex - 1 >= 0) {
                        playTrack(currentTrackIndex - 1);
                    } else {
                        playTrack(songs.length - 1);
                    }
                }
            }
        }

        player.addEventListener('ended', () => {
            handleNextOrPrev('next');
        });

        async function downloadAllSongs() {
            if (songs.length === 0) {
                alert('歌單尚未載入，請稍後再試。');
                return;
            }
            const btn = document.getElementById('download-btn');
            const statusElem = document.getElementById('download-status');
            btn.disabled = true;

            let downloaded = 0;
            let failed = 0;

            for (let i = 0; i < songs.length; i++) {
                const song = songs[i];
                statusElem.textContent = `正在下載 ${i + 1}/${songs.length}：${song.title}`;
                try {
                    const response = await fetch(song.file);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    await response.blob(); // 確保完整下載，Service Worker 會同步存入快取
                    downloaded++;
                } catch (e) {
                    console.error(`下載失敗：${song.title}`, e);
                    failed++;
                }
            }

            if (failed === 0) {
                btn.textContent = '✅ 已全部下載';
                statusElem.textContent = `全部 ${downloaded} 首已儲存，現在可離線播放！`;
                statusElem.style.color = '#34c759';
            } else {
                btn.disabled = false;
                btn.textContent = '⬇️ 重新嘗試';
                statusElem.textContent = `✅ ${downloaded} 首成功，❌ ${failed} 首失敗`;
                statusElem.style.color = '#ff9f0a';
            }

            initPlaylist(); // 刷新已下載標籤
        }
    </script>
</body>
</html>
