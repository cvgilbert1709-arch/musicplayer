<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>離線音樂播放器</title>
    
    <!-- iOS PWA 專用標籤，隱藏 Safari 網址列並允許背景播放 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="音樂盒">
    <link rel="apple-touch-icon" href="icon.png">

    <link rel="manifest" href="manifest.json">

    <style>
        /* 深色 iOS 風格介面 */
        :root {
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: calc(var(--safe-top) + 20px) 20px calc(var(--safe-bottom) + 20px) 20px;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: calc(100vh - calc(var(--safe-top) + var(--safe-bottom) + 40px));
        }
        h1 { font-size: 24px; margin-bottom: 20px; text-align: center; }
        #player-container {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            margin-bottom: 20px;
        }
        #now-playing { font-size: 16px; color: #a0a0a0; margin-bottom: 15px; }
        
        /* 播放控制列 */
        #controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .mode-btn {
            background: #2a2a2a;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .mode-btn.active {
            background: #007aff;
        }

        audio { width: 100%; margin-top: 10px; }
        #playlist {
            list-style: none;
            padding: 0;
            margin: 0;
            overflow-y: auto;
            flex-grow: 1;
        }
        li {
            padding: 15px;
            background: #2a2a2a;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        li:active { background: #3a3a3a; }
        li.active { background: #007aff; color: white; font-weight: bold; }
        
        /* 下載狀態標籤 */
        .status-badge {
            font-size: 12px;
            padding: 2px 6px;
            border-radius: 10px;
            background: #3a3a3a;
            color: #aaa;
        }
        li.active .status-badge {
            background: rgba(255,255,255,0.2);
            color: #fff;
        }
        .downloaded {
            color: #4cd964 !important; /* iOS 系統綠色 */
        }
    </style>
</head>
<body>

    <h1>我的離線音樂盒</h1>

    <div id="player-container">
        <div id="controls-row">
            <div id="now-playing">未在播放</div>
            <!-- 播放模式切換按鈕 -->
            <button id="mode-toggle" class="mode-btn" onclick="togglePlayMode()">🔁 順序播放</button>
        </div>
        <audio id="player" controls preload="auto"></audio>
    </div>

    <ul id="playlist"></ul>

    <script>
        // 1. 註冊 Service Worker 處理離線檔案攔截
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('Service Worker 註冊成功'))
                .catch(err => console.log('Service Worker 註冊失敗:', err));
        }

        let songs = []; 
        let currentTrackIndex = 0;
        let playMode = 'sequence'; // 預設為 'sequence' (順序)，可切換為 'random' (隨機)
        
        const player = document.getElementById('player');
        const playlistElem = document.getElementById('playlist');
        const nowPlayingElem = document.getElementById('now-playing');
        const modeToggleBtn = document.getElementById('mode-toggle');

        // 2. 從 Python 生成的 JSON 檔案動態載入歌單
        fetch('playlist.json')
            .then(res => res.json())
            .then(data => {
                songs = data;
                initPlaylist();
            })
            .catch(err => {
                nowPlayingElem.textContent = "無法載入歌單";
                console.error(err);
            });

        // 3. 初始化並渲染播放清單（包含智慧化下載狀態檢查）
        async function initPlaylist() {
            playlistElem.innerHTML = '';
            
            // 開啟 Service Worker 的快取資料庫（名稱必須與 sw.js 完全對齊）
            const cache = await caches.open('music-player-v2');

            for (let index = 0; index < songs.length; index++) {
                const song = songs[index];
                const li = document.createElement('li');
                li.dataset.index = index;
                
                // 顯示：歌名 - 歌手
                const textSpan = document.createElement('span');
                textSpan.textContent = `${song.title} - ${song.artist}`;
                li.appendChild(textSpan);

                // 下載狀態標籤
                const statusSpan = document.createElement('span');
                statusSpan.classList.add('status-badge');
                
                // 💡【核心修正機制】：將相對路徑 "song/xxx.mp3" 轉換成具備網域的完整 URL 物件
                // 這樣才能 100% 精準與 Service Worker 儲存的絕對網址成功對齊
                const absoluteUrl = new URL(song.file, window.location.href).href;
                
                // 比對資料庫中是否存在此音樂檔案
                const cachedResponse = await cache.match(absoluteUrl);
                if (cachedResponse) {
                    statusSpan.textContent = '🟢 已下載';
                    statusSpan.classList.add('downloaded');
                } else {
                    statusSpan.textContent = '⏳ 未下載';
                }
                li.appendChild(statusSpan);

                li.onclick = () => playTrack(index);
                playlistElem.appendChild(li);
            }
        }

        // 4. 切換播放模式（順序 / 隨機）
        function togglePlayMode() {
            if (playMode === 'sequence') {
                playMode = 'random';
                modeToggleBtn.textContent = '🔀 隨機播放';
                modeToggleBtn.classList.add('active');
            } else {
                playMode = 'sequence';
                modeToggleBtn.textContent = '🔁 順序播放';
                modeToggleBtn.classList.remove('active');
            }
        }

        // 5. 播放音樂核心邏輯
        function playTrack(index) {
            if (index < 0 || index >= songs.length) return;
            currentTrackIndex = index;
            const song = songs[currentTrackIndex];

            player.src = song.file;
            player.play().catch(err => console.log("等待手動播放觸發:", err));

            nowPlayingElem.textContent = `正在播放: ${song.title}`;
            
            // 更新畫面的高亮顯示
            document.querySelectorAll('#playlist li').forEach((li, idx) => {
                if (idx === index) li.classList.add('active');
                else li.classList.remove('active');
            });

            // 連動更新 iOS 鎖定畫面控制面板
            updateMediaSession(song);
        }

        // 6. 音樂播放時，即時更新「已下載」綠色標籤
        player.addEventListener('playing', () => {
            // 音樂播放 2 秒後（此時 Service Worker 肯定已將檔案完整下載並存入快取），刷新 UI 清單狀態
            setTimeout(() => {
                initPlaylist(); 
            }, 2000);
        });

        // 7. 串接 iOS Media Session API (支援背景播放與鎖定面板控制)
        function updateMediaSession(song) {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: song.title,
                    artist: song.artist,
                    album: '本地離線播放清單',
                    artwork: [{ src: 'icon.png', sizes: '512x512', type: 'image/png' }]
                });

                // 綁定 iOS 控制中心的按鈕（包含鎖定畫面、耳機線控、智慧手錶）
                navigator.mediaSession.setActionHandler('play', () => player.play());
                navigator.mediaSession.setActionHandler('pause', () => player.pause());
                navigator.mediaSession.setActionHandler('previoustrack', () => handleNextOrPrev('prev'));
                navigator.mediaSession.setActionHandler('nexttrack', () => handleNextOrPrev('next'));
            }
        }

        // 8. 統一處理下一首/上一首的切換邏輯（完美融合隨機與順序模式）
        function handleNextOrPrev(direction) {
            if (playMode === 'random') {
                // 隨機模式：從歌單中任意抽選一首
                const randomIndex = Math.floor(Math.random() * songs.length);
                playTrack(randomIndex);
            } else {
                // 順序模式
                if (direction === 'next') {
                    if (currentTrackIndex + 1 < songs.length) {
                        playTrack(currentTrackIndex + 1);
                    } else {
                        playTrack(0); // 播完最後一首則回到第一首
                    }
                } else {
                    if (currentTrackIndex - 1 >= 0) {
                        playTrack(currentTrackIndex - 1);
                    } else {
                        playTrack(songs.length - 1); // 退回到最後一首
                    }
                }
            }
        }

        // 9. 自動續播邏輯：當歌曲播放完畢，自動切換至下一首
        player.addEventListener('ended', () => {
            handleNextOrPrev('next');
        });
    </script>
</body>
</html>
